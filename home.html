<!DOCTYPE html>
<html lang="tr-TR">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <META HTTP-EQUIV="content-language" CONTENT="TR"  />
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesaj App</title>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">

        <link rel="stylesheet" href="style.css">

</head>

<body class="container">

    <p>Toplam Kullanıcı Sayısı: <span id="txtTotalUserCount"></span></p>

    <div id="areaJoinRoom">
        <h1>Odaya Katılma Ekranı</h1>
		<label>Kullanıcı Adı:</label>
        <input class="form-control" type="text" id="txtUsername" name="txtUsername" value="default"><br>
		<label>Oda Adı:</label>
        <input class="form-control" type="text" id="txtRoomId" name="txtRoomId" placeholder="Özel Oda Adı"><br>
        <span>Popüler Başlıklar: </span>
        <span class="badge bg-secondary">Genel</span>
        <span class="badge bg-secondary">Backend</span>
        <span class="badge bg-secondary">Frontend</span>
        <span class="badge bg-secondary">Android</span>
        <span class="badge bg-secondary">IOS</span>
        <span class="badge bg-secondary">Flutter</span>
        <span class="badge bg-secondary">React Native</span>
        <span class="badge bg-secondary">Database</span>
        <br><br>
        <button type="submit" class="btn btn-info" onclick="joinGame()" id="subBtn">Odaya Katıl</button><br>
    </div>

    <div id="areaRoomScreen" style="display: none;">
        <p>Oda Kullanıcı Sayısı <span id="txtRoomUserCount"></span></p>
        <h1 id="txtWelcomeRoom"></h1>
        <div class="row">
            <div class="col-3">
                <ul id="txtRoomUsers" class="list-group">
                    <li class="list-group-item">denee</li>
                </ul>
            </div>
            <div class="col-9">
				<label>Mesaj Kutusu:<span class="text-muted">(Ctrl+Enter mesaj gönder.)</span></label>
                <textarea tabindex="0" name="txtMessage" id="txtMessage" rows="3" class="form-control"></textarea>
                <button class="btn btn-info sendButton" onclick="sendMessage()">Mesaj Gönder</button>
                <br><br><br>
                <div id="messageList">

                </div>
            </div>
        </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
	<script type="text/javascript">
	// Using jQuery.
	$(function() {
			$('#txtRoomId').keypress(function(e) {
				// Enter pressed?
				if(e.which == 10 || e.which == 13) {
					joinGame();
					//console.log(e.which);
				}
			$(this).find('input[type=submit]').hide();
		});
			$('#txtMessage').keypress(function(e) {
				// Enter pressed?
				if(e.which == 10) {
					sendMessage();
					//console.log(e.which);
				}
			$(this).find('input[type=submit]').hide();
		});
		
	});
</script>

</body>
</html>
